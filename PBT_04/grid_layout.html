<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B3 Grid - PBT04</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,sans-serif;background:#e2e8f0}
.shop{display:grid;grid-template-columns:200px 1fr 200px;grid-template-areas:"header header header" "hero hero hero" "sidebar main ads" "footer footer footer";gap:20px;max-width:1200px;margin:0 auto;padding:20px}
.header{grid-area:header;background:#0f172a;color:#fff;padding:20px;border-radius:8px}
.hero{grid-area:hero;display:grid;grid-template-columns:1fr 1fr;gap:20px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:24px;border-radius:8px}
.hero-box{background:rgba(255,255,255,.15);padding:16px;border-radius:8px}
.hero-featured{grid-column:span 2;background:rgba(255,255,255,.2);padding:16px;border-radius:8px}
.sidebar{grid-area:sidebar;background:#fff;padding:16px;border-radius:8px}
.sidebar label{display:block;margin:8px 0}
.main{grid-area:main;background:#fff;padding:16px;border-radius:8px}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.product{background:#f8fafc;padding:10px;border:1px solid #e2e8f0;border-radius:6px}
.ads{grid-area:ads;background:#fff;padding:16px;border-radius:8px}
.footer{grid-area:footer;background:#334155;color:#cbd5e1;text-align:center;padding:16px;border-radius:8px}
.ph{background:#64748b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:4px}
.ph.sm{height:100px}
.ph.md{height:120px;margin-bottom:8px}
.ph.ad{height:180px;margin-bottom:12px}
@media(max-width:800px){.shop{grid-template-columns:1fr;grid-template-areas:"header" "hero" "sidebar" "main" "ads" "footer"}.product-grid{grid-template-columns:repeat(2,1fr)}.hero-featured{grid-column:span 1}}
</style>
</head>
<body>
<div class="shop">
<header class="header"><h1>ShopVN Grid</h1><p>Nguyen Van Da - 2451160753</p></header>
<section class="hero">
<div class="hero-featured">
<div class="ph md">FEATURED</div>
<h2>San pham noi bat</h2>
<p>Giam 50% hom nay</p>
</div>
<div class="hero-box">
<div class="ph md">BANNER</div>
<h2>Khuyen mai he</h2>
</div>
<div class="hero-box">
<div class="ph md">BANNER 2</div>
<h2>Hang moi</h2>
</div>
</section>
<aside class="sidebar">
<h3>Filter</h3>
<label><input type="checkbox"> Duoi 500k</label>
<label><input type="checkbox"> Tren 1 trieu</label>
<label><input type="checkbox"> Khuyen mai</label>
</aside>
<main class="main">
<h2>San pham</h2>
<div class="product-grid">
<div class="product"><div class="ph sm">P1</div><p>Ao thun</p></div>
<div class="product"><div class="ph sm">P2</div><p>Quan jean</p></div>
<div class="product"><div class="ph sm">P3</div><p>Giay</p></div>
<div class="product"><div class="ph sm">P4</div><p>Tui</p></div>
<div class="product"><div class="ph sm">P5</div><p>Mu</p></div>
<div class="product"><div class="ph sm">P6</div><p>Kinh</p></div>
</div>
</main>
<aside class="ads">
<div class="ph ad">ADS 1</div>
<div class="ph ad">ADS 2</div>
</aside>
<footer class="footer"><p>Footer - PBT04 CSS Grid Layout</p></footer>
</div>
</body>
</html>
