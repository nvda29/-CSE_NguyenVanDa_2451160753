<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Counter - PBT09 C1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Counter Debug (Fixed)</h1>
    <p class="count" aria-live="polite">0</p>
    <div class="actions">
      <button type="button" id="incrementBtn">+1</button>
      <button type="button" id="decrementBtn">-1</button>
      <button type="button" id="resetBtn">Reset</button>
      <button type="button" id="clearHistory">Clear history</button>
    </div>
    <ul id="history"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
