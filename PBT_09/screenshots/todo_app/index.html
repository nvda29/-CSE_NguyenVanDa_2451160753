<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App - PBT09</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Todo App</h1>
      <p class="subtitle">Nguyen Van Da - 2451160753</p>
    </header>
    <form id="todoForm">
      <input id="todoInput" type="text" placeholder="Them viec can lam..." autocomplete="off">
      <button type="submit">Add</button>
    </form>
    <div class="toolbar">
      <span id="countLabel">0 items left</span>
      <div class="filters">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="active">Active</button>
        <button type="button" class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button type="button" id="clearCompleted">Clear completed</button>
    </div>
    <ul id="todoList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
