<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTTH03 — Bài 2: Quản lý công việc</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="page-header">
        <h1 id="page-title">Quản lý công việc cá nhân</h1>
        <button type="button" id="btn-open-form" class="btn btn-primary">Thêm công việc</button>
    </header>

    <section class="stats" aria-label="Thống kê">
        <p>Tổng: <strong id="stat-total">0</strong></p>
        <p>Đã hoàn thành: <strong id="stat-done">0</strong></p>
        <p>Chưa hoàn thành: <strong id="stat-todo">0</strong></p>
    </section>

    <div id="message-area" class="message-area" role="status" aria-live="polite"></div>

    <ul id="task-list" class="task-list" aria-label="Danh sách công việc"></ul>

    <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <h2 id="modal-title">Thêm công việc</h2>
                <button type="button" id="btn-close-modal" class="btn-icon" aria-label="Đóng">&times;</button>
            </div>
            <form id="task-form" novalidate>
                <input type="hidden" id="f-internal-id" value="">
                <div class="form-group">
                    <label for="f-title">Tiêu đề <span class="required">*</span></label>
                    <input type="text" id="f-title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="f-description">Mô tả ngắn <span class="required">*</span></label>
                    <textarea id="f-description" name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="f-due">Hạn hoàn thành <span class="required">*</span></label>
                    <input type="date" id="f-due" name="dueDate" required>
                </div>
                <div class="form-group">
                    <label for="f-priority">Mức ưu tiên <span class="required">*</span></label>
                    <select id="f-priority" name="priority" required>
                        <option value="">— Chọn —</option>
                        <option value="high">Cao</option>
                        <option value="medium">Trung bình</option>
                        <option value="low">Thấp</option>
                    </select>
                </div>
                <div class="form-group checkbox-row">
                    <input type="checkbox" id="f-done" name="done">
                    <label for="f-done">Đã hoàn thành</label>
                </div>
                <div class="modal-actions">
                    <button type="button" id="btn-cancel" class="btn btn-secondary">Hủy</button>
                    <button type="submit" id="btn-save" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
